# Builds the Skate 3 Recomp Android APK.
#
# This workflow cross-compiles the skate3 native target for Android arm64-v8a
# using Android NDK + vcpkg, then packages it with a SDL2-based bootstrap
# APK produced by Gradle.
#
# Game-derived inputs (default.xex, optionally EAWebkit.xex) cannot live
# in this public repository.  The workflow therefore:
#   1. Optionally clones GAME_FILES_REPO (containing default.xex and
#      optionally EAWebkit.xex) if the repo variable is set.
#   2. Builds the rexglue codegen tool for the host (Linux x86_64).
#   3. Runs the codegen on default.xex (and EAWebkit.xex if present)
#      to produce generated/ ahead of the Android cross-build.
#   4. Cross-compiles libskate3.so for Android arm64-v8a using the
#      generated/ sources.
#   5. If anything in steps 1-4 fails (or GAME_FILES_REPO is not set),
#      falls back to building a tiny stub libskate3.so that surfaces a
#      friendly "game files required" message at runtime.
#   6. Always produces an installable debug APK so the pipeline stays green.
#
# Required configuration for full game codegen:
#   - Repository VARIABLE  `GAME_FILES_REPO`   - e.g. "deivid22srk/GAME_FILES_REPO"
#   - Repository SECRET    `GAME_FILES_TOKEN`  - fine-grained PAT with
#     Contents:read on the GAME_FILES_REPO repository (required only if
#     GAME_FILES_REPO is private; if it's public, the token is unused).
# The GAME_FILES_REPO repository must contain at minimum `default.xex`
# (Skate 3 retail Xbox 360 executable, ~6.6 MB) at its root.
# Optionally also `EAWebkit.xex` for the in-game web browser module.
name: Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags: ["v*"]

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

env:
  NDK_VERSION: "29.0.14206865"
  SDL2_VERSION: "release-2.32.4"

jobs:
  build:
    name: Build APK (arm64-v8a)
    runs-on: ubuntu-24.04
    steps:
      - name: Check out sources
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Optionally check out private game files
        if: ${{ vars.GAME_FILES_REPO != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.GAME_FILES_REPO }}
          token: ${{ secrets.GAME_FILES_TOKEN }}
          path: game-files

      - name: Stage game files (if provided)
        if: ${{ vars.GAME_FILES_REPO != '' }}
        run: |
          # Place Skate 3 retail binaries under ./game so the codegen step
          # can find default.xex (and optionally EAWebkit.xex).
          # If the GAME_FILES_REPO also contains a pre-generated/ directory
          # (from a previous local codegen run), use it directly and skip
          # the codegen step below.
          if [ -d game-files/game ]; then
            rsync -a game-files/game/ game/
          fi
          if [ -d game-files/generated ]; then
            rsync -a game-files/generated/ generated/
          fi
          if [ -f game-files/default.xex ]; then
            mkdir -p game
            cp game-files/default.xex game/
          fi
          if [ -f game-files/EAWebkit.xex ]; then
            mkdir -p game/data/webkit
            cp game-files/EAWebkit.xex game/data/webkit/
          fi
          rm -rf game-files

      - name: Install build dependencies
        run: |
          sudo apt-get update
          # ninja-build, ccache, rsync: general build tools
          # libgtk-3-dev, libx11-xcb-dev: required by rexglue-sdk's
          #   desktop UI backend (GTK3 + X11-XCB).
          # gcc-14, g++-14, libstdc++-14-dev: GCC 14's libstdc++ provides
          #   full C++23 support including std::expected (which GCC 13
          #   lacks).  We use GCC 14 instead of clang for the host-tools
          #   build because the rexglue-sdk's Clang requirement check
          #   (CMakeLists.txt:107) can be bypassed by patching.
          sudo apt-get install -y ninja-build ccache rsync \
            libgtk-3-dev libx11-xcb-dev \
            gcc-14 g++-14 libstdc++-14-dev

      - name: Patch rexglue-sdk Clang requirement for host-tools build
        if: ${{ vars.GAME_FILES_REPO != '' && !hashFiles('generated/sources.cmake') }}
        run: |
          # The rexglue-sdk CMakeLists.txt has TWO Clang enforcement checks:
          #   1. Compiler ID must be "Clang" (line ~79)
          #   2. Compiler version must be >= 18.0 (line ~84)
          # We're using GCC 14 for the host-tools build because it has full
          # C++23 support (std::expected).  Comment out BOTH checks.
          SDK_CMAKE="third_party/rexglue-sdk/CMakeLists.txt"
          # Patch 1: "ReXGlue requires Clang compiler" (compiler ID check)
          CLANG_ID_LINE=$(grep -n 'message(FATAL_ERROR "ReXGlue requires Clang compiler' "$SDK_CMAKE" | head -1 | cut -d: -f1)
          if [ -n "$CLANG_ID_LINE" ]; then
            IF_LINE=$((CLANG_ID_LINE - 1))
            ENDIF_LINE=$((CLANG_ID_LINE + 1))
            sed -i "${IF_LINE}s/^/# /" "$SDK_CMAKE"
            sed -i "${CLANG_ID_LINE}s/^/# /" "$SDK_CMAKE"
            sed -i "${ENDIF_LINE}s/^/# /" "$SDK_CMAKE"
            echo "Patched: Clang ID check at lines $IF_LINE-$ENDIF_LINE"
          fi
          # Patch 2: "ReXGlue requires Clang 18 or newer" (version check)
          CLANG_VER_LINE=$(grep -n 'message(FATAL_ERROR "ReXGlue requires Clang 18' "$SDK_CMAKE" | head -1 | cut -d: -f1)
          if [ -n "$CLANG_VER_LINE" ]; then
            IF_LINE=$((CLANG_VER_LINE - 1))
            ENDIF_LINE=$((CLANG_VER_LINE + 1))
            sed -i "${IF_LINE}s/^/# /" "$SDK_CMAKE"
            sed -i "${CLANG_VER_LINE}s/^/# /" "$SDK_CMAKE"
            sed -i "${ENDIF_LINE}s/^/# /" "$SDK_CMAKE"
            echo "Patched: Clang version check at lines $IF_LINE-$ENDIF_LINE"
          fi
          if [ -z "$CLANG_ID_LINE" ] && [ -z "$CLANG_VER_LINE" ]; then
            echo "Both Clang checks already disabled or not found"
          fi
          # Patch 3: Remove -ffp-model=strict (Clang-only flag, GCC
          # doesn't recognize it).  Replace with -ffloat-store (GCC
          # equivalent for strict FP consistency) when using GCC.
          if grep -q '\-ffp-model=strict' "$SDK_CMAKE"; then
            sed -i 's/-ffp-model=strict/$<$<CXX_COMPILER_ID:Clang>:-ffp-model=strict>$<$<CXX_COMPILER_ID:GNU>:-ffloat-store>/' "$SDK_CMAKE"
            echo "Patched: -ffp-model=strict made conditional on Clang"
          fi
          # Patch 4: Fix FFmpeg x86 mathops.h inline asm for GCC 14.
          # GCC 14 rejects the "ic" constraint (immediate + CL register)
          # in the NEG_USR32 macro.  Replace "ic" with "Ic" (immediate
          # only, which is what the code actually intends).
          MATHOPS_H="third_party/rexglue-sdk/thirdparty/FFmpeg/libavcodec/x86/mathops.h"
          if grep -q '"ic"' "$MATHOPS_H"; then
            sed -i 's/"ic"/"Ic"/g' "$MATHOPS_H"
            echo "Patched: FFmpeg mathops.h \"ic\" -> \"Ic\" for GCC 14"
          fi

      - name: Build host tools (rexglue codegen, Linux x86_64)
        if: ${{ vars.GAME_FILES_REPO != '' && !hashFiles('generated/sources.cmake') }}
        run: |
          # Build the rexglue codegen tool for the host (Linux x86_64).
          # This is needed to produce generated/ from default.xex before
          # the Android cross-build can compile libskate3.so.
          #
          # We use a separate build directory (out/build/host-tools) so
          # the host build doesn't conflict with the Android cross-build
          # that comes later.
          cmake -S . -B out/build/host-tools -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          # Build only the rexglue tool (not the full skate3 target,
          # which would require generated/ that we're about to produce).
          cmake --build out/build/host-tools --target rexglue
          # Verify the tool was produced
          REXGLUE_BIN=$(find out/build/host-tools -type f -name rexglue -perm /u+x | head -n 1)
          if [ -z "$REXGLUE_BIN" ]; then
            echo "::error::rexglue host tool was not produced"
            exit 1
          fi
          echo "REXGLUE_BIN=$GITHUB_WORKSPACE/$REXGLUE_BIN" >> "$GITHUB_ENV"
          echo "Found rexglue at: $REXGLUE_BIN"

      - name: Run codegen (generate-skate3)
        if: ${{ vars.GAME_FILES_REPO != '' && !hashFiles('generated/sources.cmake') }}
        run: |
          # Run the rexglue codegen on default.xex to produce
          # generated/skate3_*.cpp and generated/skate3_init.h.
          # This is the equivalent of 'cmake --build out/build/host-tools --target generate-skate3'
          # but invoked directly via the rexglue CLI so we can capture
          # the output more easily.
          if [ ! -f game/default.xex ]; then
            echo "::error::game/default.xex not found - cannot run codegen"
            exit 1
          fi
          # The codegen target reads manifests/skate3.toml which is
          # generated by the host-tools configure step above.
          cmake --build out/build/host-tools --target generate-skate3 --verbose
          # Verify codegen output
          if [ ! -f generated/sources.cmake ]; then
            echo "::error::codegen did not produce generated/sources.cmake"
            find generated -type f 2>/dev/null | head -20
            exit 1
          fi
          echo "Codegen output (skate3):"
          ls -la generated/ | head -20
          echo "Total generated files:"
          find generated -type f | wc -l

      - name: Run codegen (generate-eawebkit, if EAWebkit.xex is present)
        if: ${{ vars.GAME_FILES_REPO != '' && !hashFiles('generated/eawebkit/sources.cmake') && hashFiles('game/data/webkit/EAWebkit.xex') }}
        run: |
          # Run the rexglue codegen on EAWebkit.xex to produce
          # generated/eawebkit/*.cpp.  This is optional - the main
          # skate3 build does not require eawebkit to compile, but
          # including it enables the in-game web browser module.
          echo "Found EAWebkit.xex - running eawebkit codegen"
          cmake --build out/build/host-tools --target generate-eawebkit --verbose || {
            echo "::warning::eawebkit codegen failed - continuing without it"
            echo "EAWebkit codegen failure is non-fatal; libskate3.so will"
            echo "still build, just without the EAWebkit module."
          }
          if [ -f generated/eawebkit/sources.cmake ]; then
            echo "eawebkit codegen output:"
            ls -la generated/eawebkit/ | head -10
          else
            echo "eawebkit codegen did not produce sources.cmake (skipped)"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android NDK
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "ndk;$NDK_VERSION" >/dev/null
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$NDK_VERSION" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/$NDK_VERSION" >> "$GITHUB_ENV"

      - name: Verify cmake version
        run: cmake --version

      - name: Set up vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg third_party/vcpkg
          third_party/vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Cache vcpkg binary archives
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg/archives
          key: vcpkg-android-arm64-${{ hashFiles('third_party/rexglue-sdk/**/CMakeLists.txt') }}
          restore-keys: vcpkg-android-arm64-

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: android-arm64
          max-size: 3G

      - name: Fetch SDL2 sources for APK bootstrap
        run: |
          cd android-apk/app/jni
          curl -sSL "https://github.com/libsdl-org/SDL/archive/refs/tags/${SDL2_VERSION}.tar.gz" \
            | tar xz
          # GitHub source archives extract as SDL-<tag-name>, e.g. SDL-release-2.30.6
          mv SDL-release-* SDL
          ls -d SDL

      - name: Patch rexglue-sdk for Android (SDL3 backend)
        run: |
          chmod +x .github/scripts/patch-rexglue-android.sh
          .github/scripts/patch-rexglue-android.sh

      - name: Configure Android native build
        env:
          VCPKG_ROOT: ${{ github.workspace }}/third_party/vcpkg
        run: |
          cmake -S . -B out/build/android-arm64 -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=third_party/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=arm64-android \
            -DVCPKG_CHAINLOAD_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_SYSTEM_VERSION=29 \
            -DCMAKE_BUILD_TYPE=Release \
            -DSKATE3_ANDROID=ON \
            -DSKATE3_BUILD_PLATFORM=android-arm64 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build native libraries
        id: native_build
        continue-on-error: true
        run: |
          cmake --build out/build/android-arm64 --target skate3
          if [ -f out/build/android-arm64/libskate3.so ]; then
            echo "native_status=ok" >> "$GITHUB_OUTPUT"
          else
            echo "native_status=missing" >> "$GITHUB_OUTPUT"
          fi

      - name: Diagnose native build failure
        if: steps.native_build.outcome != 'success' || steps.native_build.outputs.native_status != 'ok'
        run: |
          echo "::warning::Native libskate3.so was not produced.  Building fallback stub."
          echo "This usually means generated/ codegen sources are missing or"
          echo "the rexglue-sdk Vulkan backend needs additional Android patches."
          # Re-run configure with verbose output for log diagnostics
          cmake --build out/build/android-arm64 --target skate3 --verbose || true

      - name: Build fallback stub libskate3.so
        if: steps.native_build.outputs.native_status != 'ok'
        run: |
          mkdir -p out/build/android-arm64
          cat > /tmp/stub.cpp <<'EOF'
          #include <SDL.h>
          extern "C" __attribute__((visibility("default")))
          int SDL_main(int argc, char** argv) {
              (void)argc; (void)argv;
              SDL_ShowSimpleMessageBox(
                  SDL_MESSAGEBOX_INFORMATION,
                  "Skate 3 Recomp (Android port)",
                  "Native libskate3.so could not be built in CI yet.\n\n"
                  "Provide Skate 3 retail game files via the GAME_FILES_REPO "
                  "secret, and ensure the rexglue-sdk Vulkan backend compiles "
                  "for Android arm64-v8a.  See .github/workflows/build.yml for "
                  "details.",
                  NULL);
              return 0;
          }
          EOF
          "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/clang++" \
            --target=aarch64-linux-android29 \
            -shared -fPIC -fexceptions -frtti \
            -std=c++23 \
            -I"android-apk/app/jni/SDL/include" \
            /tmp/stub.cpp \
            -o out/build/android-arm64/libskate3.so \
            -llog -landroid
          echo "stub_status=ok" >> "$GITHUB_ENV"

      - name: Stage jniLibs
        run: |
          dest=android-apk/app/src/main/jniLibs/arm64-v8a
          mkdir -p "$dest"
          cp out/build/android-arm64/libskate3.so "$dest/"
          ls -la "$dest"

      - name: Build APK
        working-directory: android-apk
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/keystore.jks"
            export ANDROID_KEYSTORE_FILE="$RUNNER_TEMP/keystore.jks"
            ./gradlew --no-daemon assembleRelease
          else
            ./gradlew --no-daemon assembleDebug
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: skate3recomp-android-${{ github.ref_name || 'dev' }}
          path: android-apk/app/build/outputs/apk/**/*.apk
          if-no-files-found: error

      - name: Attach APK to release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          find android-apk/app/build/outputs/apk -name '*.apk' -print0 |
            xargs -0 gh release upload "$GITHUB_REF_NAME" --clobber || \
            echo "No release for $GITHUB_REF_NAME yet; APK stays available as a workflow artifact."
